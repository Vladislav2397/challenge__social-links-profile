<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0" />
        <!-- displays site properly based on user's device -->

        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png" />

        <link
            rel="prefetch"
            href="./assets/fonts/static/Inter-Regular.ttf" />
        <link
            rel="prefetch"
            href="./assets/fonts/static/Inter-SemiBold.ttf" />
        <link
            rel="prefetch"
            href="./assets/fonts/static/Inter-Bold.ttf" />

        <link
            rel="stylesheet"
            href="./reset.css" />
        <link
            rel="stylesheet"
            href="./style.css" />

        <title>Frontend Mentor | Social links profile</title>

        <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
        <style>
            .attribution {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                padding-bottom: 1rem;
                font-size: 0.6875rem;
                text-align: center;
            }
            .attribution a {
                color: hsl(228, 45%, 44%);
            }
        </style>
    </head>
    <body>
        <main class="container">
            <article class="card">
                <img
                    class="avatar"
                    src="./assets/images/avatar-jessica.jpeg"
                    alt="Jessica Randall" />
                <h1 class="title">Jessica Randall</h1>
                <p class="subtitle">London, United Kingdom</p>
                <p class="description">
                    "Front-end developer and avid reader."
                </p>
                <button class="button">GitHub</button>
                <button class="button">Frontend Mentor</button>
                <button class="button">LinkedIn</button>
                <button class="button">Twitter</button>
                <button class="button">Instagram</button>
            </article>
        </main>

        <footer class="attribution">
            Challenge by
            <a
                href="https://www.frontendmentor.io/challenges/social-links-profile-UG32l9m6dQ">
                Frontend Mentor
            </a>
            . Coded by
            <a href="https://www.frontendmentor.io/profile/Vladislav2397">
                @Vladislav2397
            </a>
            .
        </footer>
    </body>
</html>
